<form class="nrw-screen" novalidate>
  <div class="nrw-question-stack nrw-question-stack--single">
    <div class="nrw-question-block">
      <fieldset>
        <legend>
          <h2>How we use your personal data</h2>
        </legend>
        <p class="nrw-body-copy">We’ll use the information you provide in line with UK data protection laws. For more about how we collect, store and use your data, read our <a href="#">privacy notice</a>.</p>

        <div class="nrw-checkboxes">
                <label class="nrw-checkbox-item" for="personal-data-understood">
                  <input type="checkbox" id="personal-data-understood" name="personal-data-understood">
                  <span class="nrw-checkbox-control" aria-hidden="true"></span>
                  <span class="nrw-checkbox-content">
                    <span class="nrw-checkbox-label">I have read and understood this information</span>
                  </span>
                </label>
        </div>
      </fieldset>
    </div>
  </div>

  <div class="nrw-button-row">
    <button type="button" class="nrw-button nrw-button--secondary nrw-button--back">Back</button>
    <button type="submit" class="nrw-button nrw-button--primary nrw-button--continue">
      <span>Continue</span>
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M9.3 5.3 16 12l-6.7 6.7-1.4-1.4 5.3-5.3-5.3-5.3 1.4-1.4Z"></path>
      </svg>
    </button>
  </div>
</form>
