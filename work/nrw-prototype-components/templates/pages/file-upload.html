<form class="nrw-screen" novalidate>
  <div class="nrw-question-stack nrw-question-stack--single">
    <div class="nrw-question-block">
      <h2>Upload supporting evidence</h2>
      <p class="nrw-body-copy">Upload a file that supports your application.</p>

      <div class="nrw-file-upload">
        <div class="nrw-file-upload__dropzone">
          <p class="nrw-file-upload__instruction">Drag and drop or</p>
          <label class="nrw-button nrw-button--primary nrw-button--medium nrw-file-upload__button" for="supporting-evidence">
            Browse files
          </label>
          <input class="nrw-file-upload__input" id="supporting-evidence" name="supporting-evidence" type="file">
        </div>

        <div class="nrw-file-upload__files" aria-live="polite">
          <div class="nrw-file-upload__file-header" role="row">
            <span role="columnheader">Filename</span>
            <span role="columnheader">Size</span>
            <span role="columnheader">Status</span>
          </div>
          <div class="nrw-file-upload__file-row" role="row">
            <span role="cell">example-document.pdf</span>
            <span role="cell">2MB</span>
            <span role="cell">Uploaded</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="nrw-button-row">
    <button type="button" class="nrw-button nrw-button--secondary nrw-button--back">Back</button>
    <button type="submit" class="nrw-button nrw-button--primary nrw-button--continue">
      <span>Continue</span>
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M9.3 5.3 16 12l-6.7 6.7-1.4-1.4 5.3-5.3-5.3-5.3 1.4-1.4Z"></path>
      </svg>
    </button>
  </div>
</form>
